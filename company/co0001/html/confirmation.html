<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>お問い合わせ確認</title>
    <link rel="stylesheet" href="..\..\..\bootstrap\css\bootstrap.css" />
    <link rel="stylesheet" href="..\..\..\css\common.css" />
    <link rel="stylesheet" href="..\css\style.css" />
    <script src="..\..\..\jQuery\jQuery-v3.5.1.js"></script>
    <script src="..\..\..\bootstrap\js\bootstrap.js"></script>
    <script src="..\..\..\js\common.js"></script>
    <script src="..\js\program.js"></script>
  </head>
  <body onload="confirmationProc()">
    <div class="container">
      <header>
        <div class="col-sm-9 items">
          <h1>お問い合わせ確認</h1>
        </div>
      </header>
    </div>
    <hr />
    <div class="container">
      <div class="col-sm-9 items">
        <p>問い合わせ内容をご確認下さい。</p>
        <div class="form-group">
          <label for="company">会社名</label>
          <input
            type="text"
            id="company"
            name="company"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="name">お名前</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="tel">電話番号</label>
          <input
            type="tel"
            id="tel"
            name="tel"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="mail">メールアドレス</label>
          <input
            type="email"
            id="mail"
            name="mail"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="inquiry">問い合わせ内容</label>
          <textarea
            id="inquiry"
            name="inquiry"
            class="form-control txtarea"
            rows="10"
            readonly
          ></textarea>
        </div>
        <button type="submit" class="btn btn-default" onclick="history.back()">
          戻る
        </button>
        <button
          type="submit"
          class="btn btn-default"
          onclick="transitionProc('confirmation')"
        >
          送信する
        </button>
      </div>
    </div>
    <hr />
    <div class="container">
      <footer>
        <p id="copyright"><span id="ver"></span></p>
      </footer>
    </div>
  </body>
</html>
