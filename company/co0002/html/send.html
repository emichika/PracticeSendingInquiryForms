<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>送信完了</title>
    <link rel="stylesheet" href="..\..\..\bootstrap\css\bootstrap.css" />
    <link rel="stylesheet" href="..\..\..\css\common.css" />
    <link rel="stylesheet" href="..\css\style.css" />
    <script src="..\..\..\jQuery\jQuery-v3.5.1.js"></script>
    <script src="..\..\..\bootstrap\js\bootstrap.js"></script>
    <script src="..\..\..\js\common.js"></script>
    <script src="..\js\program.js"></script>
  </head>
  <body onload="sendLoad()">
    <div class="container">
      <header>
        <div class="col-sm-9 items">
          <h1>お問い合わせ頂きありがとうございました。</h1>
        </div>
      </header>
    </div>
    <hr />
    <div class="container">
      <div class="col-sm-9 items">
        <h1><p>練習結果</p></h1>
        <div class="form-group">
          <label for="company">会社名 : </label>
          <label id="companyResult"></label>
          <input
            type="text"
            id="company"
            name="company"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="postalCode">郵便番号 : </label>
          <label id="postalCodeResult"></label>
          <input
            type="text"
            id="postalCode"
            name="postalCode"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="streetAddress">住所 : </label>
          <label id="streetAddressResult"></label>
          <input
            type="text"
            id="streetAddress"
            name="streetAddress"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="name">お名前 : </label>
          <label id="nameResult"></label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="tel">電話番号 : </label>
          <label id="telResult"></label>
          <input
            type="tel"
            id="tel"
            name="tel"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="mail"> メールアドレス : </label>
          <label id="mailResult"></label>
          <input
            type="email"
            id="mail"
            name="mail"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="inquiry">問い合わせ内容 : </label>
          <label id="inquiryResult"></label>
          <textarea
            id="inquiry"
            name="inquiry"
            class="form-control txtarea"
            rows="10"
            readonly
          ></textarea>
        </div>
        <button type="submit" class="btn btn-default" onclick="endProcess()">
          ホームへ戻る
        </button>
      </div>
    </div>
    <hr />
    <div class="container">
      <footer>
        <p id="copyright"><span id="ver"></span></p>
      </footer>
    </div>
  </body>
</html>
