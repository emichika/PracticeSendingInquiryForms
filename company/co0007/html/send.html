<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>送信完了</title>
    <link rel="stylesheet" href="..\..\..\bootstrap\css\bootstrap.css" />
    <link rel="stylesheet" href="..\..\..\css\common.css" />
    <link rel="stylesheet" href="..\css\style.css" />
    <script src="..\..\..\jQuery\jQuery-v3.5.1.js"></script>
    <script src="..\..\..\bootstrap\js\bootstrap.js"></script>
    <script src="..\..\..\js\common.js"></script>
    <script src="..\js\program.js"></script>
  </head>
  <body onload="sendProc()">
    <div class="container">
      <header>
        <div class="col-sm-9 items">
          <h1>お問い合わせ頂きありがとうございました。</h1>
        </div>
      </header>
    </div>
    <hr />
    <div class="container">
      <div class="col-sm-9 items">
        <h1><p>練習結果</p></h1>
        <div class="form-group">
          <label for="company">会社名 : </label>
          <label id="companyResult"></label>
          <input
            type="text"
            id="company"
            name="company"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="postalCode">郵便番号 : </label>
          <label id="postalCodeResult"></label>
          <div>
            <input
              type="text"
              id="firstPostalCode"
              name="firstPostalCode"
              class="form-control firstPostalCode"
              readonly
            />
            <label>-</label>
            <input
              type="text"
              id="latterPostalCode"
              name="latterPostalCode"
              class="form-control latterPostalCode"
              readonly
            />
          </div>
        </div>
        <div class="form-group">
          <label class="firstStreetAddressLabel" for="firstStreetAddress"
            >住所 1 :
          </label>
          <label id="firstStreetAddressResult"></label>
          <input
            type="text"
            id="firstStreetAddress"
            name="firstStreetAddress"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label class="latterStreetAddressLabel" for="latterStreetAddress"
            >住所 2 :
          </label>
          <label id="latterStreetAddressResult"></label>
          <input
            type="text"
            id="latterStreetAddress"
            name="latterStreetAddress"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="name">お名前 : </label>
          <label id="nameResult"></label>
          <div>
            <input
              type="text"
              id="lastName"
              name="lastName"
              class="form-control lastName"
              readonly
            />
            <input
              type="text"
              id="firstName"
              name="firstName"
              class="form-control firstName"
              readonly
            />
          </div>
        </div>
        <div class="form-group">
          <label for="furigana">フリガナ : </label>
          <label id="furiganaResult"></label>
          <div>
            <input
              type="text"
              id="lastFurigana"
              name="lastFurigana"
              class="form-control lastFurigana"
              readonly
            />
            <input
              type="text"
              id="firstFurigana"
              name="firstFurigana"
              class="form-control firstFurigana"
              readonly
            />
          </div>
        </div>
        <div class="form-group">
          <label for="tel">電話番号 : </label>
          <label id="telResult"></label>
          <input
            type="tel"
            id="tel"
            name="tel"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="mail">メールアドレス : </label>
          <label id="mailResult"></label>
          <input
            type="email"
            id="mail"
            name="mail"
            class="form-control txtWid"
            readonly
          />
        </div>
        <div class="form-group">
          <label for="inquiry">問い合わせ内容 : </label>
          <label id="inquiryResult"></label>
          <textarea
            id="inquiry"
            name="inquiry"
            class="form-control txtarea"
            rows="10"
            readonly
          ></textarea>
        </div>
        <button
          type="submit"
          class="btn btn-default"
          onclick="transitionProc('send')"
        >
          ホームへ戻る
        </button>
      </div>
    </div>
    <hr />
    <div class="container">
      <footer>
        <p id="copyright"><span id="ver"></span></p>
      </footer>
    </div>
  </body>
</html>
